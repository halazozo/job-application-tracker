{% extends 'applications/base.html' %}

{% block content %}

<div class="auth-card bg-white mt-5">
    <div class="auth-top">
        <div class="brand-circle mx-auto mb-3">
            <i class="bi bi-briefcase-fill"></i>
        </div>

        <h2 class="fw-bold mb-1">Welcome Back</h2>
        <p class="mb-0 opacity-75">
            Login to manage your job applications.
        </p>
    </div>

    <div class="p-4">
        {% if form.errors %}
            <div class="alert alert-danger rounded-4">
                <i class="bi bi-exclamation-circle"></i>
                Wrong username or password.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text rounded-start-4">
                        <i class="bi bi-person"></i>
                    </span>
                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter your username"
                        required
                    >
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text rounded-start-4">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter your password"
                        required
                    >
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-rounded py-2 fw-semibold">
                <i class="bi bi-box-arrow-in-right"></i>
                Login
            </button>
            <div class="text-center mt-3">
    <a href="{% url 'custom_password_reset' %}">Forgot password?</a>
</div>
            <p class="text-center text-muted mt-4 mb-0">
    Don't have an account?
    <a href="{% url 'register' %}">Create one here</a>
</p>
        </form>
    </div>
</div>

{% endblock %}
