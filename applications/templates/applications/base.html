<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Application Tracker</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --main-blue: #2563eb;
            --main-purple: #7c3aed;
            --main-pink: #db2777;
            --main-green: #16a34a;
            --main-orange: #f97316;
            --main-red: #dc2626;
            --dark: #111827;
            --soft-bg: #f3f4f6;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 30%),
                radial-gradient(circle at top right, rgba(219, 39, 119, 0.16), transparent 28%),
                linear-gradient(135deg, #f8fafc 0%, #eef2ff 45%, #fdf2f8 100%);
            font-family: Arial, sans-serif;
        }

        .navbar-custom {
            background: rgba(17, 24, 39, 0.96);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.18);
        }

        .brand-circle {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--main-blue), var(--main-purple), var(--main-pink));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-right: 8px;
        }

        .page-container {
            max-width: 1250px;
        }

        .hero-card {
            border: none;
            border-radius: 28px;
            color: white;
            background:
                linear-gradient(135deg, rgba(37, 99, 235, 0.95), rgba(124, 58, 237, 0.95), rgba(219, 39, 119, 0.9));
            box-shadow: 0 20px 45px rgba(79, 70, 229, 0.32);
            overflow: hidden;
            position: relative;
        }

        .hero-card::after {
            content: "";
            position: absolute;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: rgba(255,255,255,0.16);
            right: -80px;
            top: -80px;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .soft-card {
            background: rgba(255,255,255,0.92);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 24px;
            box-shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
        }

        .stat-card {
            border: none;
            border-radius: 22px;
            color: white;
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.13);
            transition: 0.2s;
            overflow: hidden;
            position: relative;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-card i {
            font-size: 28px;
            opacity: 0.95;
        }

        .stat-total {
            background: linear-gradient(135deg, #111827, #374151);
        }

        .stat-applied {
            background: linear-gradient(135deg, #2563eb, #60a5fa);
        }

        .stat-waiting {
            background: linear-gradient(135deg, #64748b, #94a3b8);
        }

        .stat-interview {
            background: linear-gradient(135deg, #f59e0b, #f97316);
        }

        .stat-rejected {
            background: linear-gradient(135deg, #dc2626, #fb7185);
        }

        .stat-accepted {
            background: linear-gradient(135deg, #16a34a, #22c55e);
        }

        .filter-card {
            border: none;
            border-radius: 24px;
            background: rgba(255,255,255,0.94);
            box-shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
        }

        .application-card {
            border: none;
            border-radius: 24px;
            background: white;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
            transition: 0.2s;
            border-left: 7px solid #2563eb;
        }

        .application-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 38px rgba(15, 23, 42, 0.13);
        }

        .border-applied {
            border-left-color: #2563eb;
        }

        .border-waiting {
            border-left-color: #64748b;
        }

        .border-interview {
            border-left-color: #f59e0b;
        }

        .border-rejected {
            border-left-color: #dc2626;
        }

        .border-accepted {
            border-left-color: #16a34a;
        }

        .badge-status {
            padding: 8px 12px;
            border-radius: 50px;
            font-size: 13px;
        }

        .btn-rounded {
            border-radius: 14px;
        }

        .form-control,
        .form-select {
            border-radius: 14px;
            padding: 11px 14px;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
            border-color: #2563eb;
        }

        .section-title {
            font-weight: 800;
            color: #111827;
        }

        .small-muted {
            color: #6b7280;
            font-size: 14px;
        }

        .empty-box {
            border: 2px dashed #cbd5e1;
            border-radius: 24px;
            background: #f8fafc;
        }

        .file-pill {
            border-radius: 50px;
            padding: 6px 11px;
            font-size: 13px;
        }

        .progress {
            height: 10px;
            border-radius: 50px;
            background: rgba(255,255,255,0.3);
        }

        .progress-bar {
            border-radius: 50px;
        }

        .auth-card {
            max-width: 460px;
            margin: auto;
            border: none;
            border-radius: 28px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.15);
            overflow: hidden;
        }

        .auth-top {
            color: white;
            background: linear-gradient(135deg, #2563eb, #7c3aed, #db2777);
            padding: 28px;
            text-align: center;
        }

        .form-page-card {
            border: none;
            border-radius: 28px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.10);
            overflow: hidden;
        }

        .form-page-top {
            color: white;
            background: linear-gradient(135deg, #111827, #2563eb, #7c3aed);
            padding: 28px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
    <div class="container page-container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="{% url 'dashboard' %}">
            <span class="brand-circle">
                <i class="bi bi-briefcase-fill"></i>
            </span>
            Job Tracker
        </a>

        <div class="d-flex align-items-center gap-3">
            {% if user.is_authenticated %}
                <span class="text-white-50 d-none d-md-inline">
                    <i class="bi bi-person-circle"></i>
                    {{ request.user.username }}
                </span>

                <form method="post" action="{% url 'logout' %}" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm btn-rounded">
                        <i class="bi bi-box-arrow-right"></i>
                        Logout
                    </button>
                </form>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container page-container py-4">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success alert-dismissible fade show rounded-4 shadow-sm" role="alert">
                <i class="bi bi-check-circle-fill"></i>
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
