{% extends 'applications/base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="soft-card p-5 text-center">
            <div class="mb-3">
                <i class="bi bi-exclamation-triangle-fill text-danger display-3"></i>
            </div>

            <h2 class="fw-bold mb-3">Delete Application?</h2>

            <p class="text-muted">
                This action will permanently remove this application from your tracker.
            </p>

            <div class="bg-light rounded-4 p-3 mb-4">
                <h5 class="fw-bold mb-1">{{ application.company_name }}</h5>
                <p class="text-muted mb-0">{{ application.job_title }}</p>
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="d-flex justify-content-center gap-2">
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-rounded">
                        <i class="bi bi-arrow-left"></i>
                        Cancel
                    </a>

                    <button type="submit" class="btn btn-danger btn-rounded">
                        <i class="bi bi-trash3"></i>
                        Yes, Delete
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
