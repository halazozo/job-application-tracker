{% extends 'applications/base.html' %}

{% block content %}

<div class="auth-card bg-white mt-5">
    <div class="auth-top">
        <div class="brand-circle mx-auto mb-3">
            <i class="bi bi-envelope-check-fill"></i>
        </div>

        <h2 class="fw-bold mb-1">Check Your Email</h2>
        <p class="mb-0 opacity-75">
            We sent password reset instructions.
        </p>
    </div>

    <div class="p-4 text-center">
        <p class="text-muted">
            If an account exists with that email, you will receive a reset link shortly.
        </p>

        <a href="{% url 'login' %}" class="btn btn-primary btn-rounded">
            Back to Login
        </a>
    </div>
</div>

{% endblock %}
