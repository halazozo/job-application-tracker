{% extends 'applications/base.html' %}

{% block content %}

<div class="auth-card bg-white mt-5">
    <div class="auth-top">
        <div class="brand-circle mx-auto mb-3">
            <i class="bi bi-shield-lock-fill"></i>
        </div>

        <h2 class="fw-bold mb-1">Choose New Password</h2>
        <p class="mb-0 opacity-75">
            Enter your new password below.
        </p>
    </div>

    <div class="p-4">
        {% if validlink %}
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">New Password</label>
                    <input
                        type="password"
                        name="new_password1"
                        class="form-control"
                        placeholder="Enter new password"
                        required
                    >
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm New Password</label>
                    <input
                        type="password"
                        name="new_password2"
                        class="form-control"
                        placeholder="Repeat new password"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-rounded py-2 fw-semibold">
                    Change Password
                </button>
            </form>
        {% else %}
            <div class="alert alert-danger rounded-4">
                This password reset link is invalid or expired.
            </div>

            <a href="{% url 'custom_password_reset' %}" class="btn btn-primary btn-rounded w-100">
                Request New Link
            </a>
        {% endif %}
    </div>
</div>

{% endblock %}
